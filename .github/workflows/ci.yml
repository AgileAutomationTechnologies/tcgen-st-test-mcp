name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - development

jobs:
  node:
    name: node-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify

  native-windows:
    name: native-windows-strucpp
    runs-on: windows-latest
    env:
      STRUCPP_REF: eca6ff87dc28b804298944ed4ee6e633afad368d
      STRUCPP_DISTRIBUTION_VERSION: 0.5.13-tcgen.3
      STRUCPP_EXPECTED_VERSION: 0.5.13-tcgen.3
      STRUCPP_PATH: ${{ github.workspace }}\STruCpp\dist\bin\strucpp-win.exe
    steps:
      - uses: actions/checkout@v4
        with:
          path: tcgen-st-test-mcp
      - uses: actions/checkout@v4
        with:
          repository: AgileAutomationTechnologies/STruCpp
          ref: ${{ env.STRUCPP_REF }}
          path: STruCpp
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            tcgen-st-test-mcp/package-lock.json
            STruCpp/package-lock.json
      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc
      - name: Resolve MSYS2 GCC path
        run: |
          $gpp = Join-Path "${{ steps.msys2.outputs.msys2-location }}" "ucrt64\bin\g++.exe"
          if (!(Test-Path -LiteralPath $gpp -PathType Leaf)) {
            throw "Expected MSYS2 UCRT64 g++ at '$gpp', but it was not found."
          }
          & $gpp --version
          "STRUCPP_GPP_PATH=$gpp" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build STruC++
        working-directory: STruCpp
        run: |
          npm ci
          npm run typecheck
          npm run build:pkg:win
          npm run smoke:bin -- dist/bin/strucpp-win.exe
      - name: Run STruC++ native samples
        working-directory: STruCpp
        run: |
          & $env:STRUCPP_PATH tests\st-validation\function_blocks\fb_accumulator.st --gpp $env:STRUCPP_GPP_PATH --test tests\st-validation\function_blocks\test_fb_accumulator.st
          & $env:STRUCPP_PATH tests\st-validation\function_blocks\basic_fb.st --no-default-libs --gpp $env:STRUCPP_GPP_PATH --test tests\st-validation\function_blocks\test_basic_fb.st
      - name: Run MCP native verification
        working-directory: tcgen-st-test-mcp
        run: |
          npm ci
          npm run verify:native
          npm pack --dry-run
